<div class="login-container">
  <mat-card class="login-card">
    <div class="logo-placeholder">
       <mat-icon class="main-icon">verified_user</mat-icon>
    </div>
    
    <mat-card-header>
      <mat-card-title>MajoStep</mat-card-title>
      <mat-card-subtitle>Ingresa a tu cuenta</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo Electrónico</mat-label>
          <input matInput formControlName="email" type="email" placeholder="ejemplo@correo.com">
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" placeholder="Tu contraseña segura">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix (click)="hide = !hide" type="button">
            <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
        </mat-form-field>

        <button mat-flat-button class="login-button full-width" [disabled]="loginForm.invalid || loading">
          {{ loading ? 'Iniciando...' : 'INICIAR SESIÓN' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
