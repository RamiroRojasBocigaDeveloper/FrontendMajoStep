<h2 mat-dialog-title>{{ isEdit ? 'Editar Categoría' : 'Nueva Categoría' }} 👟</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombre de la Categoría</mat-label>
      <input matInput formControlName="nombre">
      <mat-icon matPrefix>category</mat-icon>
      <mat-error *ngIf="form.get('nombre')?.hasError('required')">El nombre es obligatorio</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción (Opcional)</mat-label>
      <textarea matInput formControlName="descripcion" rows="3"></textarea>
      <mat-icon matPrefix>description</mat-icon>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="loading">CANCELAR</button>
  <button mat-flat-button color="primary" (click)="guardar()" [disabled]="form.invalid || loading">
    {{ loading ? 'GUARDANDO...' : (isEdit ? 'ACTUALIZAR' : 'CREAR') }}
  </button>
</mat-dialog-actions>
