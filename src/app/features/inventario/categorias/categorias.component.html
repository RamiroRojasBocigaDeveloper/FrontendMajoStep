<div class="categorias-container pink-theme">
  <mat-card class="top-bar-card">
    <div class="header-content">
      <div class="title-group">
        <h1>Categorías de Calzado</h1>
        <p>Gestiona los tipos de productos que vendes (Tenis, Sandalias, Tacones, etc.)</p>
      </div>
      <button mat-fab color="primary" (click)="abrirDialogo()" title="Nueva Categoría">
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </mat-card>

  <mat-card class="table-card margin-top">
    <div class="loading-shade" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <mat-card-content>
      <table mat-table [dataSource]="categorias" class="full-width">
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <!-- Nombre Column -->
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef> Categoría </th>
          <td mat-cell *matCellDef="let element"> 
            <span class="category-pill">{{element.nombre}}</span>
          </td>
        </ng-container>

        <!-- Descripción Column -->
        <ng-container matColumnDef="descripcion">
          <th mat-header-cell *matHeaderCellDef> Descripción </th>
          <td mat-cell *matCellDef="let element"> {{element.descripcion || 'Sin descripción'}} </td>
        </ng-container>

        <!-- Acciones Column -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef> Acciones </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" (click)="abrirDialogo(element)" title="Editar">
              <mat-icon>edit_note</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminar(element.id)" title="Eliminar">
              <mat-icon>delete_sweep</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="categorias.length === 0 && !loading" class="empty-state">
        <mat-icon>inventory</mat-icon>
        <p>No hay categorías registradas aún.</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
